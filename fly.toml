# GoPilot Relay — Fly.io configuration
# Deploy: fly launch → fly deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "gopilot-relay"
primary_region = "ord"

[build]

[env]
  PORT = "4800"
  ROOM_TTL_MS = "14400000"
  MAX_ROOMS = "10000"
  NODE_ENV = "production"

[http_service]
  internal_port = 4800
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 2500
    soft_limit = 2000

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/health"
    port = 4800
    timeout = "3s"
    type = "http"
